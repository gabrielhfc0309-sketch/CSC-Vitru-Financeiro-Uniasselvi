    <!-- Firebase SDK v11.6.1 com suporte a tempo real robusto -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Ponte de comunicação direta para integrar o código ES Module do Firebase com o React/Babel
        window.FirebaseBridge = {
            db: null,
            auth: null,
            isInitialized: false,
            onStateChangeCallback: null,
            
            init: async function(customConfig = null) {
                try {
                    let config = null;
                    if (customConfig) {
                        config = customConfig;
                    } else if (typeof __firebase_config !== 'undefined') {
                        // Configuração nativa provida pelo workspace
                        config = JSON.parse(__firebase_config);
                    } else {
                        // Verifica se existe credencial personalizada guardada no Vercel/Local
                        const saved = localStorage.getItem('vitru_user_firebase_config');
                        if (saved) {
                            config = JSON.parse(saved);
                        }
                    }
                    
                    if (!config) {
                        console.warn("Firebase não inicializado: Nenhuma configuração ativa localizada.");
                        if (this.onStateChangeCallback) this.onStateChangeCallback(false, "Falta Configuração");
                        return false;
                    }
                    
                    const app = initializeApp(config);
                    this.db = getFirestore(app);
                    this.auth = getAuth(app);
                    
                    // Regra de segurança 3: Autenticar obrigatoriamente antes de ler/escrever
                    let user = null;
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            const credentials = await signInWithCustomToken(this.auth, __initial_auth_token);
                            user = credentials.user;
                        } catch(e) {
                            const credentials = await signInAnonymously(this.auth);
                            user = credentials.user;
                        }
                    } else {
                        const credentials = await signInAnonymously(this.auth);
                        user = credentials.user;
                    }
                    
                    this.isInitialized = true;
                    if (this.onStateChangeCallback) {
                        this.onStateChangeCallback(true, null);
                    }
                    return true;
                } catch(e) {
                    console.error("Erro na inicialização do Firebase:", e);
                    if (this.onStateChangeCallback) {
                        this.onStateChangeCallback(false, e.message);
                    }
                    return false;
                }
            },
            
            saveData: async function(docId, payload) {
                if (!this.isInitialized) throw new Error("Firebase não configurado.");
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'vitru-ops-2026-prod';
                
                // Regra de segurança 1: Caminho estrito obrigatório para gravação de artefato
                const docRef = doc(this.db, 'artifacts', appId, 'public', 'data', 'planilhas', docId);
                await setDoc(docRef, {
                    data: payload,
                    updatedAt: Date.now()
                });
            },
            
            listenData: function(docId, onUpdate, onError) {
                if (!this.isInitialized) return () => {};
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'vitru-ops-2026-prod';
                
                // Regra de segurança 1: Escuta ativa em tempo real pelo caminho estrito
                const docRef = doc(this.db, 'artifacts', appId, 'public', 'data', 'planilhas', docId);
                return onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().data) {
                        onUpdate(docSnap.data().data);
                    }
                }, (err) => {
                    if (onError) onError(err);
                });
            }
        };

        // Auto inicialização na carga da página
        window.addEventListener('load', () => {
            window.FirebaseBridge.init();
        });
    </script>

        // Dropdown customizado para sanar em definitivo o seletor com fundo branco (Ref: image_005c29.png)
        const DarkDropdown = ({ options, value, onChange, disabled }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            return (
                <div className="relative w-full text-left" ref={dropdownRef}>
                    <button
                        type="button"
                        disabled={disabled}
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full bg-slate-950 border border-slate-700 hover:border-slate-600 rounded-lg p-2.5 text-sm font-semibold text-slate-100 flex justify-between items-center transition focus:ring-2 focus:ring-purple-600 focus:outline-none disabled:opacity-50"
                    >
                        <span>{value}</span>
                        <span className={`text-xs text-slate-400 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}>▼</span>
                    </button>
                    {isOpen && (
                        <div className="absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-700 rounded-lg shadow-2xl z-50 overflow-hidden max-h-60 overflow-y-auto">
                            {options.map((opt) => (
                                <button
                                    key={opt}
                                    type="button"
                                    onClick={() => {
                                        onChange(opt);
                                        setIsOpen(false);
                                    }}
                                    className={`w-full text-left px-3.5 py-2.5 text-xs font-semibold hover:bg-purple-950/40 hover:text-white transition-colors flex items-center justify-between ${
                                        value === opt ? 'bg-purple-900/40 text-yellow-400 border-l-4 border-yellow-400' : 'text-slate-300'
                                    }`}
                                >
                                    <span>{opt}</span>
                                    {value === opt && <span className="text-emerald-400">✓</span>}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

            // --- ESTADOS DE PERSISTÊNCIA E SINCRONIZAÇÃO ---

            const [isLoadingCloud, setIsLoadingCloud] = useState(false);

            const showToast = (message, type = 'success') => {

            // --- 1. ESTADOS PARA OS CENÁRIOS DE ATINGIMENTO ---

                { id: 3, month: 'Março', original: 30140, attained: 30424 },
                { id: 4, month: 'Abril', original: 21408, attained: 18776 },
                { id: 5, month: 'Maio', original: 20249, attained: 14851 },

                { id: 7, month: 'Julho', original: 31502, attained: 0 },
                { id: 8, month: 'Agosto', original: 31100, attained: 0 },
                { id: 9, month: 'Setembro', original: 16746, attained: 0 },
                { id: 10, month: 'Outubro', original: 12384, attained: 0 },
                { id: 11, month: 'Novembro', original: 10990, attained: 0 },
                { id: 12, month: 'Dezembro', original: 21905, attained: 0 },
            ]);

            const handleProjectionChange = (id, field, value) => {
                const numValue = value === '' ? '' : parseFloat(value) || 0;
                setProjections(prev => prev.map(p => p.id === id ? { ...p, [field]: numValue } : p));
            };

            // --- CÁLCULO DOS CENÁRIOS DINÂMICOS ---
            const calculatedScenarios = useMemo(() => {
                return projections.map((p, idx) => {
                    const isSecondSemester = idx >= 6;
                    const isSeptOnwards = idx >= 8;

                    const c1Projected = isSecondSemester ? Math.round(p.original * 0.905) : null;
                    const c1Attainment = c1Projected && p.attained > 0 ? (p.attained / c1Projected) * 100 : null;

                    const c2Projected = isSeptOnwards 
                        ? Math.round(p.original * 0.905) 
                        : (isSecondSemester ? p.original : null);
                    const c2Attainment = c2Projected && p.attained > 0 ? (p.attained / c2Projected) * 100 : null;

                    const originalAttainment = p.original > 0 && p.attained > 0 ? (p.attained / p.original) * 100 : 0;

                    return {
                        ...p,
                        originalAttainment,
                        c1Projected,
                        c1Attainment,
                        c2Projected,
                        c2Attainment
                    };
                });
            }, [projections]);

            // --- 2. QUALIDADE CSAT & SLA ---

                { month: 'Jan', target: 4.13, real: 4.02 },
                { month: 'Fev', target: 4.09, real: 4.05 },
                { month: 'Mar', target: 3.96, real: 3.97 },
                { month: 'Abr', target: 3.94, real: 4.05 },
                { month: 'Mai', target: 3.95, real: 4.10 },
                { month: 'Jun', target: 4.12, real: 3.80 },
                { month: 'Jul', target: 3.94, real: 0 },
                { month: 'Ago', target: 3.94, real: 0 },
                { month: 'Set', target: 3.94, real: 0 },
                { month: 'Out', target: 4.01, real: 0 },
                { month: 'Nov', target: 3.94, real: 0 },
                { month: 'Dez', target: 3.94, real: 0 },

            const [slaData, setSlaData] = useState([

                { month: 'Fev', target: 99.00, real: 99.67 },
                { month: 'Mar', target: 99.00, real: 98.76 },

                { month: 'Out', target: 99.93, real: 0 },
                { month: 'Nov', target: 99.00, real: 0 },
                { month: 'Dez', target: 99.00, real: 0 },
            ]);

            const handleQualityChange = (type, index, field, value) => {
                const numVal = value === '' ? '' : parseFloat(value) || 0;
                if (type === 'csat') {
                    setCsatData(prev => prev.map((item, i) => i === index ? { ...item, [field]: numVal } : item));

                    setSlaData(prev => prev.map((item, i) => i === index ? { ...item, [field]: numVal } : item));

            };

            // --- 3. PARAMETRIZAÇÃO DE OPERAÇÃO & HC ---
            const [dailyProductivity, setDailyProductivity] = useState(110);
            const [workingDays, setWorkingDays] = useState(23);

            const individualCapacity = useMemo(() => {
                return dailyProductivity * workingDays;
            }, [dailyProductivity, workingDays]);

            const calculatedHC = useMemo(() => {
                return calculatedScenarios.map((m, idx) => {
                    const hcOriginal = individualCapacity > 0 ? Math.ceil(m.original / individualCapacity) : 0;
                    const hcC1 = (individualCapacity > 0 && m.c1Projected !== null) ? Math.ceil(m.c1Projected / individualCapacity) : 0;
                    const hcC2 = (individualCapacity > 0 && m.c2Projected !== null) ? Math.ceil(m.c2Projected / individualCapacity) : 0;

                    return {
                        month: m.month,
                        index: idx,
                        originalVolume: m.original,
                        c1Volume: m.c1Projected || 0,
                        c2Volume: m.c2Projected || 0,
                        hcOriginal,
                        hcC1,
                        hcC2
                    };
                });

            const headcountSecondSemester = useMemo(() => {
                return calculatedHC.filter(h => h.index >= 6);

            const handleDeleteFcar = (id) => {
                setFcarList(prev => prev.filter(f => f.id !== id));

            // --- 5. CRONOGRAMA DE TAREFAS ---
            const [tasks, setTasks] = useState([

                { id: 4, month: 'Setembro', category: 'Treinamentos Processuais', title: 'Treinamento de scripts focado em regras e reajustes', date: '2ª Quinzena', status: 'Pendente' }
            ]);

            const [newTask, setNewTask] = useState({
                month: 'Julho',
                category: 'Operação / Rotina',
                title: '',
                date: '',
                status: 'Pendente'
            });

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTask.title) return;
                setTasks(prev => [...prev, { ...newTask, id: Date.now() }]);
                setNewTask({ ...newTask, title: '', date: '' });
            };

            const handleStatusChange = (id, newStatus) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, status: newStatus } : t));
            };

            const handleDeleteTask = (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            const monthProgress = useMemo(() => {
                const list = [
                    'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                    'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
                ];
                const map = {};
                list.forEach(m => {
                    const monthTasks = tasks.filter(t => t.month === m);
                    const done = monthTasks.filter(t => t.status === 'Realizado').length;
                    const total = monthTasks.length;
                    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
                    map[m] = { done, total, pct };
                });
                return map;
            }, [tasks]);

            const [calcAgents, setCalcAgents] = useState(15);
            const [calcProtocols, setCalcProtocols] = useState(2500);

            const [calcBacklog, setCalcBacklog] = useState(450);

            const calculatedAgentProdPerDay = useMemo(() => {
                if (calcAgents > 0 && calcDays > 0) {
                    return parseFloat((calcProtocols / (calcAgents * calcDays)).toFixed(1));
                }
                return 0;
            }, [calcAgents, calcProtocols, calcDays]);

            const teamDailyCapacity = useMemo(() => {
                return Math.round(calcAgents * calculatedAgentProdPerDay);
            }, [calcAgents, calculatedAgentProdPerDay]);

            const backlogResolutionTime = useMemo(() => {
                if (teamDailyCapacity > 0) {
                    return parseFloat((calcBacklog / teamDailyCapacity).toFixed(1));
                }
                return 0;
            }, [calcBacklog, teamDailyCapacity]);

            // --- CARREGAMENTO DE DADOS DO BANCO ---
            const loadState = (data) => {
                if (data.projections) setProjections(data.projections);
                if (data.csatData) setCsatData(data.csatData);
                if (data.slaData) setSlaData(data.slaData);
                if (data.fcarList) setFcarList(data.fcarList);
                if (data.tasks) setTasks(data.tasks);
                if (data.dailyProductivity !== undefined) setDailyProductivity(data.dailyProductivity);
                if (data.workingDays !== undefined) setWorkingDays(data.workingDays);
                if (data.calcAgents !== undefined) setCalcAgents(data.calcAgents);
                if (data.calcProtocols !== undefined) setCalcProtocols(data.calcProtocols);
                if (data.calcDays !== undefined) setCalcDays(data.calcDays);
                if (data.calcBacklog !== undefined) setCalcBacklog(data.calcBacklog);
            };

            // --- ATIVAÇÃO E CONTROLE DOS ESTADOS DE INICIALIZAÇÃO E COMUNICAÇÃO ---
            useEffect(() => {
                const checkBridge = () => {
                    if (window.FirebaseBridge) {
                        setFirebaseReady(window.FirebaseBridge.isInitialized);
                        
                        // Callback de atualização de estado da ponte
                        window.FirebaseBridge.onStateChangeCallback = (status, err) => {
                            setFirebaseReady(status);
                            setFirebaseError(err);
                            if (status) {
                                showToast("Serviço de Nuvem Firebase ativado com sucesso!", "success");
                            }
                        };
                    } else {
                        setTimeout(checkBridge, 100);
                    }
                };
                checkBridge();
            }, []);

            // Gerenciador de Escuta Ativa do Documento de Sincronização em Tempo Real
            useEffect(() => {
                if (!firebaseReady) return;

                const hash = window.location.hash;
                const match = hash.match(/id=([a-z0-9-]+)/i);
                if (match && match[1]) {
                    const fetchedId = match[1];
                    setBlobId(fetchedId);
                    setIsLoadingCloud(true);

                    // Escuta eventos em tempo real do Google Firestore
                    const unsubscribe = window.FirebaseBridge.listenData(fetchedId, (updatedPayload) => {
                        loadState(updatedPayload);
                        setIsLoadingCloud(false);
                    }, (err) => {
                        console.error("Falha ao escutar documento:", err);
                        showToast("Erro de sincronização. Carregando em cache local.", "error");
                        setIsLoadingCloud(false);
                    });

                    return () => unsubscribe();
                }
            }, [firebaseReady]);

            // --- CONFIGURAR FIREBASE DE SESSÃO PROPRIA (PARA VERCEL) ---
            const handleSaveCustomConfig = () => {
                try {

                    localStorage.setItem('vitru_user_firebase_config', JSON.stringify(parsed));

                    return;

                        currentId = 'vitru-' + Math.random().toString(36).substring(2, 9);
                    }

                    await window.FirebaseBridge.saveData(currentId, payload);
                    setBlobId(currentId);
                    window.location.hash = `id=${currentId}`;
                    showToast("Painel sincronizado e salvo com sucesso!", "success");
                } catch (e) {

                                        &nbsp;&nbsp;"storageBucket": "vitru-project.appspot.com",<br />
                                        &nbsp;&nbsp;"messagingSenderId": "123456789",<br />
                                        &nbsp;&nbsp;"appId": "1:1234:web:abcd"<br />
                                        {"}"}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Cole o Objeto JSON firebaseConfig aqui:</label>
                                        <textarea 
                                            rows="6"
                                            placeholder="Cole aqui o código JSON obtido no console do Firebase..."
                                            value={dbConfigText}
                                            onChange={(e) => setDbConfigText(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-slate-100 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-purple-600"
                                        />
                                    </div>
                                    <div className="flex justify-between items-center pt-2">
                                        <button 
                                            type="button"
                                            onClick={() => {
                                                localStorage.removeItem('vitru_user_firebase_config');
                                                showToast("Configuração customizada removida. Usando padrão.", "success");
                                                setShowDbModal(false);
                                                window.location.reload();
                                            }}
                                            className="text-xs text-red-400 hover:underline"
                                        >
                                            Resetar Padrão
                                        </button>
                                        <div className="flex gap-3">
                                            <button 
                                                onClick={() => setShowDbModal(false)}
                                                className="px-4 py-2 text-xs font-bold text-slate-450 hover:text-white transition"
                                            >
                                                Fechar
                                            </button>
                                            <button 
                                                onClick={handleSaveCustomConfig}
                                                className="bg-purple-600 hover:bg-purple-700 text-white font-bold text-xs px-4 py-2 rounded-lg transition"
                                            >
                                                Salvar Conexão
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-slate-950 text-slate-500 py-4 text-xs text-center border-t border-slate-900 mt-auto">
                        <p>© 2026 Vitru - Customer Operations Management System</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
