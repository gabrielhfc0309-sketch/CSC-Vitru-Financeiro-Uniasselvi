<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitru Customer Operations - Dashboard Colaborativo 2026</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vitruPurple: '#5E248F',
                        vitruYellow: '#FDB813',
                    }
                }
            }
        }
    </script>

    <!-- React, ReactDOM e Babel para rodar diretamente no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts para melhor legibilidade -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar para o Dark Theme */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
        /* Animações suaves para transição de abas e modais */
        .fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="root"></div>

    <!-- Script da Aplicação React em formato JSX/Babel -->
    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icons = {
            TrendingUp: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
            ),
            Users: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            ),
            Award: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
            ),
            Target: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
            ),
            FileText: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            ),
            Calendar: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            ),
            Calculator: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
            ),
            Plus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            ),
            Trash2: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            ),
            Sliders: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
            ),
            Info: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            ),
            Share: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            ),
            Lock: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            ),
            Unlock: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
            )
        };

        const DarkDropdown = ({ options, value, onChange, disabled }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            return (
                <div className="relative w-full text-left" ref={dropdownRef}>
                    <button
                        type="button"
                        disabled={disabled}
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full bg-slate-950 border border-slate-700 hover:border-slate-600 rounded-lg p-2.5 text-sm font-semibold text-slate-100 flex justify-between items-center transition focus:ring-2 focus:ring-purple-600 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span>{value}</span>
                        <span className={`text-xs text-slate-400 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}>▼</span>
                    </button>
                    {isOpen && (
                        <div className="absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-700 rounded-lg shadow-2xl z-50 overflow-hidden max-h-60 overflow-y-auto">
                            {options.map((opt) => (
                                <button
                                    key={opt}
                                    type="button"
                                    onClick={() => {
                                        onChange(opt);
                                        setIsOpen(false);
                                    }}
                                    className={`w-full text-left px-3.5 py-2.5 text-xs font-semibold hover:bg-[#5E248F]/20 hover:text-white transition-colors flex items-center justify-between ${
                                        value === opt ? 'bg-[#5E248F]/40 text-[#FDB813] border-l-4 border-[#FDB813]' : 'text-slate-300'
                                    }`}
                                >
                                    <span>{opt}</span>
                                    {value === opt && <span className="text-emerald-400">✓</span>}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('scenarios');

            // --- ESTADOS DE SESSÃO E COLABORAÇÃO ---
            const [blobId, setBlobId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [isLoadingCloud, setIsLoadingCloud] = useState(false);
            const [toast, setToast] = useState(null);
            
            // Controle de Identidade do Usuário
            const [showJoinModal, setShowJoinModal] = useState(false);
            const [userName, setUserName] = useState('');
            const [userRole, setUserRole] = useState('viewer'); // 'editor' ou 'viewer'
            const [editPassword, setEditPassword] = useState('');
            const [savedPasswordHash, setSavedPasswordHash] = useState('');
            const [mySessionId] = useState(() => Math.random().toString(36).substring(2, 9));
            
            // Lista de Presença Online
            const [activeUsers, setActiveUsers] = useState([]);
            const lastUpdatedRef = useRef(0);

            // Modal de Configuração de Nova Sessão
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [tempName, setTempName] = useState('');
            const [tempPassword, setTempPassword] = useState('');

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 5000);
            };

            // --- 1. ESTADOS PARA OS CENÁRIOS DE ATINGIMENTO ---
            const [projections, setProjections] = useState([
                { id: 1, month: 'Janeiro', original: 32053, attained: 27688 },
                { id: 2, month: 'Fevereiro', original: 32547, attained: 31490 },
                { id: 3, month: 'Março', original: 30140, attained: 30424 },
                { id: 4, month: 'Abril', original: 21408, attained: 18776 },
                { id: 5, month: 'Maio', original: 20249, attained: 14851 },
                { id: 6, month: 'Junho', original: 15892, attained: 15549 },
                { id: 7, month: 'Julho', original: 31502, attained: 0 },
                { id: 8, month: 'Agosto', original: 31100, attained: 0 },
                { id: 9, month: 'Setembro', original: 16746, attained: 0 },
                { id: 10, month: 'Outubro', original: 12384, attained: 0 },
                { id: 11, month: 'Novembro', original: 10990, attained: 0 },
                { id: 12, month: 'Dezembro', original: 21905, attained: 0 },
            ]);

            const handleProjectionChange = (id, field, value) => {
                if (userRole !== 'editor') {
                    showToast("Você está no modo Observador. Edição bloqueada!", "error");
                    return;
                }
                const numValue = value === '' ? '' : parseFloat(value) || 0;
                setProjections(prev => prev.map(p => p.id === id ? { ...p, [field]: numValue } : p));
            };

            // --- CÁLCULO DOS CENÁRIOS DINÂMICOS ---
            const calculatedScenarios = useMemo(() => {
                return projections.map((p, idx) => {
                    const isSecondSemester = idx >= 6;
                    const isSeptOnwards = idx >= 8;

                    const c1Projected = isSecondSemester ? Math.round(p.original * 0.905) : null;
                    const c1Attainment = c1Projected && p.attained > 0 ? (p.attained / c1Projected) * 100 : null;

                    const c2Projected = isSeptOnwards 
                        ? Math.round(p.original * 0.905) 
                        : (isSecondSemester ? p.original : null);
                    const c2Attainment = c2Projected && p.attained > 0 ? (p.attained / c2Projected) * 100 : null;

                    const originalAttainment = p.original > 0 && p.attained > 0 ? (p.attained / p.original) * 100 : 0;

                    return {
                        ...p,
                        originalAttainment,
                        c1Projected,
                        c1Attainment,
                        c2Projected,
                        c2Attainment
                    };
                });
            }, [projections]);

            // --- 2. QUALIDADE CSAT & SLA ---
            const [csatData, setCsatData] = useState([
                { month: 'Jan', target: 4.13, real: 4.02 },
                { month: 'Fev', target: 4.09, real: 4.05 },
                { month: 'Mar', target: 3.96, real: 3.97 },
                { month: 'Abr', target: 3.94, real: 4.05 },
                { month: 'Mai', target: 3.95, real: 4.10 },
                { month: 'Jun', target: 4.12, real: 3.80 },
                { month: 'Jul', target: 3.94, real: 0 },
                { month: 'Ago', target: 3.94, real: 0 },
                { month: 'Set', target: 3.94, real: 0 },
                { month: 'Out', target: 4.01, real: 0 },
                { month: 'Nov', target: 3.94, real: 0 },
                { month: 'Dez', target: 3.94, real: 0 },
            ]);

            const [slaData, setSlaData] = useState([
                { month: 'Jan', target: 99.00, real: 99.88 },
                { month: 'Fev', target: 99.00, real: 99.67 },
                { month: 'Mar', target: 99.00, real: 98.76 },
                { month: 'Abr', target: 98.01, real: 98.53 },
                { month: 'Mai', target: 98.75, real: 99.52 },
                { month: 'Jun', target: 97.00, real: 99.35 },
                { month: 'Jul', target: 97.00, real: 0 },
                { month: 'Ago', target: 97.00, real: 0 },
                { month: 'Set', target: 99.57, real: 0 },
                { month: 'Out', target: 99.93, real: 0 },
                { month: 'Nov', target: 99.00, real: 0 },
                { month: 'Dez', target: 99.00, real: 0 },
            ]);

            const handleQualityChange = (type, index, field, value) => {
                if (userRole !== 'editor') {
                    showToast("Você está no modo Observador. Edição bloqueada!", "error");
                    return;
                }
                const numVal = value === '' ? '' : parseFloat(value) || 0;
                if (type === 'csat') {
                    setCsatData(prev => prev.map((item, i) => i === index ? { ...item, [field]: numVal } : item));
                } else {
                    setSlaData(prev => prev.map((item, i) => i === index ? { ...item, [field]: numVal } : item));
                }
            };

            // --- 3. PARAMETRIZAÇÃO DE OPERAÇÃO & HC ---
            const [dailyProductivity, setDailyProductivity] = useState(110);
            const [workingDays, setWorkingDays] = useState(23);

            const individualCapacity = useMemo(() => {
                return dailyProductivity * workingDays;
            }, [dailyProductivity, workingDays]);

            const calculatedHC = useMemo(() => {
                return calculatedScenarios.map((m, idx) => {
                    const hcOriginal = individualCapacity > 0 ? Math.ceil(m.original / individualCapacity) : 0;
                    const hcC1 = (individualCapacity > 0 && m.c1Projected !== null) ? Math.ceil(m.c1Projected / individualCapacity) : 0;
                    const hcC2 = (individualCapacity > 0 && m.c2Projected !== null) ? Math.ceil(m.c2Projected / individualCapacity) : 0;

                    return {
                        month: m.month,
                        index: idx,
                        originalVolume: m.original,
                        c1Volume: m.c1Projected || 0,
                        c2Volume: m.c2Projected || 0,
                        hcOriginal,
                        hcC1,
                        hcC2
                    };
                });
            }, [calculatedScenarios, individualCapacity]);

            const headcountSecondSemester = useMemo(() => {
                return calculatedHC.filter(h => h.index >= 6);
            }, [calculatedHC]);

            // --- 4. REGISTRO DE FCAR ---
            const [fcarList, setFcarList] = useState([
                {
                    id: 1,
                    month: 'Junho',
                    metric: 'CSAT',
                    fator: 'Queda de CSAT abaixo da meta (3.80 vs 4.12)',
                    causa: 'Pico de atendimentos com tempo de espera elevado na segunda quinzena por instabilidade técnica no portal.',
                    acao: 'Treinamento de contingência rápida de agentes e revisão de mensagens automáticas de status de sistema.',
                    resultado: 'Retomada gradativa no início de Julho com CSAT diário estabilizado acima de 4.0.',
                }
            ]);

            const [newFcar, setNewFcar] = useState({
                month: 'Janeiro',
                metric: 'CSAT',
                fator: '',
                causa: '',
                acao: '',
                resultado: ''
            });

            const handleAddFcar = (e) => {
                e.preventDefault();
                if (userRole !== 'editor') {
                    showToast("Você está no modo Observador. Edição bloqueada!", "error");
                    return;
                }
                if (!newFcar.fator || !newFcar.causa) return;
                setFcarList(prev => [...prev, { ...newFcar, id: Date.now() }]);
                setNewFcar({
                    month: 'Janeiro',
                    metric: 'CSAT',
                    fator: '',
                    causa: '',
                    acao: '',
                    resultado: ''
                });
            };

            const handleDeleteFcar = (id) => {
                if (userRole !== 'editor') {
                    showToast("Você está no modo Observador. Edição bloqueada!", "error");
                    return;
                }
                setFcarList(prev => prev.filter(f => f.id !== id));
            };

            // --- 5. CRONOGRAMA DE TAREFAS ---
            const [tasks, setTasks] = useState([
                { id: 1, month: 'Julho', category: 'Operação / Rotina', title: 'Festa Julina do CSC - Comidas típicas e comemoração nos times', date: '03/07/2026', status: 'Realizado' },
                { id: 2, month: 'Julho', category: 'Operação / Rotina', title: 'Acompanhamento geral das rotinas de rematrícula', date: '01/07/2026', status: 'Realizado' },
                { id: 3, month: 'Agosto', category: 'Operação / Rotina', title: 'Alinhamento com N1 sobre alteração de vencimento e descontos', date: '03/08/2026', status: 'Pendente' },
                { id: 4, month: 'Setembro', category: 'Treinamentos Processuais', title: 'Treinamento de scripts focado em regras e reajustes', date: '2ª Quinzena', status: 'Pendente' }
            ]);

            const [newTask, setNewTask] = useState({
                month: 'Julho',
                category: 'Operação / Rotina',
                title: '',
                date: '',
                status: 'Pendente'
            });

            const handleAddTask = (e) => {
                e.preventDefault();
                if (userRole !== 'editor') {
                    showToast("Você está no modo Observador. Edição bloqueada!", "error");
                    return;
                }
                if (!newTask.title) return;
                setTasks(prev => [...prev, { ...newTask, id: Date.now() }]);
                setNewTask({ ...newTask, title: '', date: '' });
            };

            const handleStatusChange = (id, newStatus) => {
                if (userRole !== 'editor') {
                    showToast("Você está no modo Observador. Edição bloqueada!", "error");
                    return;
                }
                setTasks(prev => prev.map(t => t.id === id ? { ...t, status: newStatus } : t));
            };

            const handleDeleteTask = (id) => {
                if (userRole !== 'editor') {
                    showToast("Você está no modo Observador. Edição bloqueada!", "error");
                    return;
                }
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            const monthProgress = useMemo(() => {
                const list = [
                    'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                    'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
                ];
                const map = {};
                list.forEach(m => {
                    const monthTasks = tasks.filter(t => t.month === m);
                    const done = monthTasks.filter(t => t.status === 'Realizado').length;
                    const total = monthTasks.length;
                    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
                    map[m] = { done, total, pct };
                });
                return map;
            }, [tasks]);

            // --- 6. CALCULADORA DE CAPACIDADE ---
            const [calcAgents, setCalcAgents] = useState(15);
            const [calcProtocols, setCalcProtocols] = useState(2500);
            const [calcDays, setCalcDays] = useState(5);
            const [calcBacklog, setCalcBacklog] = useState(450);

            const calculatedAgentProdPerDay = useMemo(() => {
                if (calcAgents > 0 && calcDays > 0) {
                    return parseFloat((calcProtocols / (calcAgents * calcDays)).toFixed(1));
                }
                return 0;
            }, [calcAgents, calcProtocols, calcDays]);

            const teamDailyCapacity = useMemo(() => {
                return Math.round(calcAgents * calculatedAgentProdPerDay);
            }, [calcAgents, calculatedAgentProdPerDay]);

            const backlogResolutionTime = useMemo(() => {
                if (teamDailyCapacity > 0) {
                    return parseFloat((calcBacklog / teamDailyCapacity).toFixed(1));
                }
                return 0;
            }, [calcBacklog, teamDailyCapacity]);

            const loadState = (data) => {
                if (data.projections) setProjections(data.projections);
                if (data.csatData) setCsatData(data.csatData);
                if (data.slaData) setSlaData(data.slaData);
                if (data.fcarList) setFcarList(data.fcarList);
                if (data.tasks) setTasks(data.tasks);
                if (data.dailyProductivity !== undefined) setDailyProductivity(data.dailyProductivity);
                if (data.workingDays !== undefined) setWorkingDays(data.workingDays);
                if (data.calcAgents !== undefined) setCalcAgents(data.calcAgents);
                if (data.calcProtocols !== undefined) setCalcProtocols(data.calcProtocols);
                if (data.calcDays !== undefined) setCalcDays(data.calcDays);
                if (data.calcBacklog !== undefined) setCalcBacklog(data.calcBacklog);
                if (data.savedPasswordHash) setSavedPasswordHash(data.savedPasswordHash);
            };

            // --- Sincronização Inicial de dados do Hash da URL ---
            useEffect(() => {
                const hash = window.location.hash;

                            if (!res.ok) throw new Error();
                            return res.json();

                        .then(serverPayload => {
                            // Sincroniza dados apenas se foram alterados por outra pessoa recentemente
                            if (serverPayload.meta && serverPayload.meta.lastEditedAt > lastUpdatedRef.current) {
                                if (serverPayload.meta.lastEditedBySessionId !== mySessionId) {
                                    loadState(serverPayload.data);
                                    lastUpdatedRef.current = serverPayload.meta.lastEditedAt;
                                    showToast(`Dados atualizados por ${serverPayload.meta.lastEditedBy}!`, "success");
                                }

                            // Sincroniza e limpa presença de usuários ativos na planilha (inatividade > 12s)
                            const now = Date.now();
                            let updatedPresence = { ...serverPayload.presence };
                            updatedPresence[mySessionId] = {
                                name: userName || 'Anônimo',
                                role: userRole,
                                lastSeen: now
                            };

                            const activeList = Object.keys(updatedPresence)
                                .filter(key => now - updatedPresence[key].lastSeen < 12000)
                                .map(key => ({
                                    id: key,
                                    name: updatedPresence[key].name,
                                    role: updatedPresence[key].role
                                }));

                            setActiveUsers(activeList);

                            // Salva presença de volta na nuvem se for Editor para manter o servidor atualizado
                            if (userRole === 'editor') {
                                const cleanPresence = {};
                                activeList.forEach(u => {
                                    cleanPresence[u.id] = {
                                        name: u.name,
                                        role: u.role,
                                        lastSeen: u.id === mySessionId ? now : serverPayload.presence[u.id]?.lastSeen || now
                                    };
                                });

                                fetch(`https://kvdb.io/vitru_ops_2026_bucket/${blobId}`, {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        ...serverPayload,
                                        presence: cleanPresence
                                    })
                                }).catch(() => {});
                            }
                        })
                        .catch(() => {});
                }, 4000);

                return () => clearInterval(pollInterval);
            }, [blobId, userName, userRole, mySessionId]);

            // --- SALVAR ALTERAÇÕES (Sincronização Ativa) ---
            const handleSaveToCloud = async (forcePassword = savedPasswordHash) => {
                if (userRole !== 'editor') {
                    showToast("Você não possui permissão de escrita para salvar na nuvem.", "error");
                    return;
                }

                const updateTimestamp = Date.now();
                lastUpdatedRef.current = updateTimestamp;

                const payload = {
                    data: {
                        projections, csatData, slaData, fcarList, tasks,
                        dailyProductivity, workingDays, calcAgents, calcProtocols, calcDays, calcBacklog,
                        savedPasswordHash: forcePassword
                    },
                    meta: {
                        lastEditedBy: userName || 'Supervisor',
                        lastEditedBySessionId: mySessionId,
                        lastEditedAt: updateTimestamp
                    },
                    presence: {
                        [mySessionId]: { name: userName, role: 'editor', lastSeen: Date.now() }
                    }
                };

                    if (!currentId) {
                        currentId = 'vitru-' + Math.random().toString(36).substring(2, 11);

                    const res = await fetch(`https://kvdb.io/vitru_ops_2026_bucket/${currentId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    setBlobId(currentId);
                    setSavedPasswordHash(forcePassword);
                    window.location.hash = `id=${currentId}`;
                    showToast("Dashboard sincronizado com a nuvem e disponível para o time!", "success");

                }

                                            </span>
                                        </div>

                                        <div className="border-t border-slate-850 my-2 pt-2.5 flex flex-col gap-1">
                                            <span className="text-xs text-slate-500">Status de Resolução da Fila:</span>
                                            {backlogResolutionTime <= 1 ? (
                                                <div className="bg-emerald-950 text-emerald-300 border border-emerald-900/50 p-2.5 rounded-lg text-xs font-bold mt-1 shadow-sm leading-snug">
                                                    🟢 Equipe Excelente! Daremos conta de todo o backlog em menos de 1 dia ({backlogResolutionTime} dia) de esforço planejado.
                                                </div>
                                            ) : backlogResolutionTime <= 3 ? (
                                                <div className="bg-amber-950 text-amber-300 border border-amber-900/50 p-2.5 rounded-lg text-xs font-bold mt-1 shadow-sm leading-snug">
                                                    🟡 Atenção! Sob o ritmo atual, levaremos cerca de {backlogResolutionTime} dias úteis para limpar todo o backlog acumulado na base.
                                                </div>
                                            ) : (
                                                <div className="bg-rose-950 text-rose-300 border border-rose-900/50 p-2.5 rounded-lg text-xs font-bold mt-1 shadow-sm leading-snug">
                                                    🔴 Alerta Vermelho! Sobrecarga severa detected. Levará cerca de {backlogResolutionTime} dias de esforço direto para liquidar a fila. Recomenda-se escala tática de HCs ou horas extras.
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* MODAL: CONFIGURAÇÃO DE NOVA SESSÃO COLABORATIVA */}
                    {showConfigModal && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
                                <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2 border-b border-slate-800 pb-3 mb-4">
                                    🌐 Ativar Painel Online
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Seu Nome / Identificação</label>
                                        <input 
                                            type="text"
                                            placeholder="Ex: João CSC"
                                            value={tempName}
                                            onChange={(e) => setTempName(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-[#5E248F]"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Senha para Outros Editores (Opcional)</label>
                                        <input 
                                            type="password"
                                            placeholder="Crie uma chave para controle de edições"
                                            value={tempPassword}
                                            onChange={(e) => setTempPassword(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-[#5E248F]"
                                        />
                                        <span className="text-[10px] text-slate-500 mt-1 block">Quem não possuir essa senha poderá entrar no modo Observador para acompanhar suas edições.</span>
                                    </div>
                                    <div className="flex justify-end gap-3 pt-2">
                                        <button 
                                            onClick={() => setShowConfigModal(false)}
                                            className="px-4 py-2 text-xs font-bold text-slate-400 hover:text-white transition"
                                        >
                                            Cancelar
                                        </button>
                                        <button 
                                            onClick={createCollaborativeSession}
                                            className="bg-[#5E248F] hover:bg-purple-800 text-white font-bold text-xs px-4 py-2 rounded-lg transition"
                                        >
                                            Iniciar Sessão
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: ENTRAR EM SESSÃO EXISTENTE */}
                    {showJoinModal && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
                                <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2 border-b border-slate-800 pb-3 mb-4">
                                    🤝 Entrar no Painel Compartilhado
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1">Seu Nome / Identificação</label>
                                        <input 
                                            type="text"
                                            placeholder="Ex: Carlos Supervisor"
                                            value={userName}
                                            onChange={(e) => setUserName(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-[#5E248F]"
                                        />
                                    </div>

                                    <div className="bg-slate-950 p-3.5 rounded-xl border border-slate-800 space-y-3">
                                        <label className="block text-xs font-bold text-slate-400">Selecione seu Perfil de Acesso</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button 
                                                type="button"
                                                onClick={() => setUserRole('viewer')}
                                                className={`p-2.5 rounded-lg border text-xs font-bold flex flex-col items-center justify-center gap-1 transition ${
                                                    userRole === 'viewer' 
                                                        ? 'bg-[#5E248F]/30 border-[#5E248F] text-[#FDB813]' 
                                                        : 'border-slate-800 text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                <span>👁️ Observador</span>
                                                <span className="text-[9px] font-normal text-slate-400 block">Apenas assistir</span>
                                            </button>
                                            <button 
                                                type="button"
                                                onClick={() => setUserRole('editor')}
                                                className={`p-2.5 rounded-lg border text-xs font-bold flex flex-col items-center justify-center gap-1 transition ${
                                                    userRole === 'editor' 
                                                        ? 'bg-[#5E248F]/30 border-[#5E248F] text-[#FDB813]' 
                                                        : 'border-slate-800 text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                <span>⚙️ Editor</span>
                                                <span className="text-[9px] font-normal text-slate-400 block">Requer senha</span>
                                            </button>
                                        </div>

                                        {userRole === 'editor' && (
                                            <div className="pt-2">
                                                <label className="block text-[10px] font-bold text-slate-400 mb-1">Senha de Edição</label>
                                                <input 
                                                    type="password"
                                                    placeholder="Insira a chave do criador"
                                                    value={editPassword}
                                                    onChange={(e) => setEditPassword(e.target.value)}
                                                    className="w-full bg-slate-900 border border-slate-750 p-2 rounded text-slate-100 text-xs focus:outline-none focus:ring-2 focus:ring-[#5E248F]"
                                                />
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex justify-end gap-3 pt-2">
                                        <button 
                                            onClick={handleJoinSession}
                                            disabled={isLoadingCloud}
                                            className="w-full bg-[#5E248F] hover:bg-purple-800 text-white font-bold text-sm py-2.5 rounded-lg transition"
                                        >
                                            {isLoadingCloud ? "Sincronizando..." : "Entrar no Painel"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-slate-950 text-slate-500 py-4 text-xs text-center border-t border-slate-900 mt-auto">
                        <p>© 2026 Vitru - Customer Operations Management System</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
